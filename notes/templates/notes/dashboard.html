<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>خزنتي السرية - لوحة التحكم</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        .note-form { margin-bottom: 30px; display: flex; flex-direction: column; gap: 10px; }
        input, textarea { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .note-card { background: #fff9c4; padding: 15px; margin-bottom: 10px; border-right: 5px solid #fbc02d; border-radius: 4px; }
        .logout { float: left; color: red; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/admin/logout/" class="logout">تسجيل الخروج</a>
        <h1>مرحباً بك يا {{ user.username }} 🔒</h1>
        
        <form method="POST" class="note-form">
            {% csrf_token %}
            <input type="text" name="title" placeholder="عنوان الملحوظة" required>
            <textarea name="content" rows="3" placeholder="اكتب سرك هنا..." required></textarea>
            <button type="submit">حفظ في الخزنة</button>
        </form>

        <hr>

        <h2>ملاحظاتك المؤمّنة:</h2>
        {% for note in notes %}
            <div class="note-card">
                <h3>{{ note.title }}</h3>
                <p>{{ note.content }}</p>
                <small>تاريخ الحفظ: {{ note.created_at }}</small>
                <br>
<a href="{% url 'delete_note' note.id %}" style="color: red; text-decoration: none; font-size: 13px; font-weight: bold;">🗑️ مسح من الخزنة</a>>
            </div>
        {% empty %}
            <p>لا يوجد ملاحظات بعد.. ابدأ بإضافة أول سر!</p>
        {% endfor %}
    </div>
</body>
</html>
