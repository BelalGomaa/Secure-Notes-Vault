<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>خزنة الملاحظات - إنشاء حساب</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 400px; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        form p { margin-bottom: 15px; color: #5f6368; }
        input { width: 100%; padding: 10px; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; }
        button:hover { background-color: #1557b0; }
        .helptext { font-size: 12px; color: #70757a; display: block; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔒 إنشاء حساب في الخزنة</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">بدء تأمين ملاحظاتي</button>
        </form>
    </div>
</body>
</html>
